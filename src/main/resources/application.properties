spring.application.name=backend

# ?? ???
spring.profiles.include=secret

# MySQL
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/noos_db
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.type-aliases-package=com.noos.backend.auth

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Mobile session worker
noos.mobile.session.queue-poolsize=4
noos.mobile.session.queue-capacity=64
noos.mobile.session.max-generation-sec=4500

# Mobile state measurement
noos.mobile.measure.weight.survey=0.4
noos.mobile.measure.weight.eeg=0.6
noos.mobile.measure.eeg.min-signal-quality=0.3

# Mobile push
noos.mobile.push.enabled=true
noos.mobile.push.fcm.credentials-path=
noos.mobile.push.apns.enabled=true
noos.mobile.push.apns.environment=sandbox
noos.mobile.push.apns.topic=
noos.mobile.push.apns.team-id=
noos.mobile.push.apns.key-id=
noos.mobile.push.apns.key-path=

# Mobile auth
noos.mobile.auth.jwt.secret=
noos.mobile.auth.access-ttl-min=15
noos.mobile.auth.refresh-ttl-days=14

# Mobile rate limiting
noos.mobile.ratelimit.sessions-create.per-minutes=10
noos.mobile.ratelimit.sessions-create.limit=6
noos.mobile.ratelimit.default-get.per-minutes=1
noos.mobile.ratelimit.default-get.limit=600

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=never
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=noos-backend

# Mobile health
noos.mobile.health.ace-step.cache-seconds=10
noos.mobile.health.ace-step.timeout-ms=2000
noos.mobile.min-app-version=1.0.0

# NOOS AI local runtimes
# AI 모노레포 root (ai/ 가 있는 디렉토리). 비우면 기존 레이아웃 추론 fallback.
noos.ai.root=
noos.ai.python-bin=/opt/homebrew/bin/python3
noos.ai.ace-step.base-url=http://100.120.77.82:8011
noos.ai.ace-step.timeout-sec=900
noos.ai.ace-step.auto-start=false
noos.ai.ace-step.model=acestep-v15-xl-turbo
noos.ai.ace-step.use-enhanced-request=true
noos.ai.ace-step.lm-model=acestep-5Hz-lm-1.7B
noos.ai.ace-step.request-duration-cap-sec=120
noos.ai.ace-step.inference-steps=8
noos.ai.gemma.enabled=false
noos.ai.gemma.base-url=http://127.0.0.1:8091
noos.ai.gemma.timeout-sec=120

# WiZ local lighting
noos.lighting.wiz.enabled=false
noos.lighting.wiz.auto-apply=false
noos.lighting.wiz.bulb-ips=
noos.lighting.wiz.command-timeout-ms=700
noos.lighting.wiz.alternate-interval-sec=10
