spring.application.name=backend

# ?? ???
spring.profiles.include=secret

# MySQL
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/noos_db
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.type-aliases-package=com.noos.backend.auth

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Mobile session worker
noos.mobile.session.queue-poolsize=4
noos.mobile.session.queue-capacity=64
noos.mobile.session.max-generation-sec=4500

# NOOS AI local runtimes
noos.ai.python-bin=/opt/homebrew/bin/python3
noos.ai.ace-step.base-url=http://100.120.77.82:8011
noos.ai.ace-step.timeout-sec=900
noos.ai.ace-step.auto-start=false
noos.ai.ace-step.model=acestep-v15-xl-turbo
noos.ai.ace-step.use-enhanced-request=true
noos.ai.ace-step.lm-model=acestep-5Hz-lm-1.7B
noos.ai.ace-step.request-duration-cap-sec=120
noos.ai.ace-step.inference-steps=8
noos.ai.gemma.enabled=false
noos.ai.gemma.base-url=http://127.0.0.1:8091
noos.ai.gemma.timeout-sec=120

# WiZ local lighting
noos.lighting.wiz.enabled=true
noos.lighting.wiz.auto-apply=true
noos.lighting.wiz.bulb-ips=192.168.123.100,192.168.123.102,192.168.123.112,192.168.123.113
noos.lighting.wiz.command-timeout-ms=700
noos.lighting.wiz.alternate-interval-sec=10
